---
name: ci_lint_markdown

on:
  workflow_dispatch:
  push:
    paths:
      - '**.md'
      - '.markdownlint.json'
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint.json'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.json
          globs: '**/*.md'
