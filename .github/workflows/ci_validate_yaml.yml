---
name: ci_validate_yaml

on:
  push:
    paths:
      - '**.yml'
      - '**.yaml'
      - '.yamllint.yml'
  pull_request:
    paths:
      - '**.yml'
      - '**.yaml'
      - '.yamllint.yml'

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .
          strict: false
